name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      # prisma generate (postinstall) と auth テストの Prisma Lazy Proxy が
      # DATABASE_URL を要求するため、CI 専用のダミー値を設定する。
      # 実際の DB 接続は発生しない（テストはすべてモックまたは純粋関数）。
      DATABASE_URL: postgresql://localhost:5432/ci_test
      AUTH_SECRET: ci-test-secret-at-least-32-bytes-long!!
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      STRIPE_PRICE_ID: price_ci_dummy
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
      CRON_SECRET: cron-secret-ci-dummy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
